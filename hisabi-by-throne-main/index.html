  <body>
    <div id="root"></div>
    <script>
      // One-time cleanup of zombie service workers from broken builds.
      // After cleanup, the new VitePWA service worker takes over normally.
      (function() {
        var CLEANUP_KEY = 'sw_cleanup_v2';
        if (localStorage.getItem(CLEANUP_KEY)) return; // already done

        var p1 = Promise.resolve();
        var p2 = Promise.resolve();

        if ('serviceWorker' in navigator) {
          p1 = navigator.serviceWorker.getRegistrations().then(function(regs) {
            return Promise.all(regs.map(function(r) {
              console.log('[Cleanup] Unregistering old SW:', r.scope);
              return r.unregister();
            }));
          });
        }

        if ('caches' in window) {
          p2 = caches.keys().then(function(names) {
            return Promise.all(names.map(function(n) {
              console.log('[Cleanup] Deleting cache:', n);
              return caches.delete(n);
            }));
          });
        }

        Promise.all([p1, p2]).then(function() {
          localStorage.setItem(CLEANUP_KEY, Date.now().toString());
          console.log('[Cleanup] Done — fresh start');
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
